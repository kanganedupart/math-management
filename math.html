<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강안교육 · 교재 자동 편집</title>
<style>
  /* ==========================================
     ★ 강안교육 - 사용자 설정 영역 ★
     아래 한 줄만 본인의 Hugging Face Spaces URL로 변경하세요.
     ============================================ */
  :root {
    --teal: #225C5C;
    --teal-light: #4a8585;
    --teal-bg: #e8f1f0;
    --bg: #f7f9f9;
    --text: #1a2e2e;
    --gray: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* === Header === */
  header {
    background: white;
    border-bottom: 2px solid var(--teal);
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--teal);
    color: white;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 18px;
  }
  .logo-text {
    font-weight: 700;
    color: var(--teal);
    font-size: 17px;
  }
  .user {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #666;
    font-size: 14px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    background: var(--teal-light);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }

  /* === Main === */
  main {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 24px;
  }
  h1 {
    color: var(--teal);
    font-size: 26px;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 32px;
  }

  /* === Cards === */
  .card-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(34,92,92,0.06);
    border: 1px solid #e8eded;
    transition: all 0.2s;
  }
  .card.highlight {
    border-left: 4px solid var(--teal);
  }
  .card.clickable {
    cursor: pointer;
  }
  .card.clickable:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(34,92,92,0.14);
    border-color: var(--teal);
  }
  .badge {
    display: inline-block;
    background: var(--teal);
    color: white;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .badge.gray {
    background: #ddd;
    color: #555;
  }
  .card h2 {
    font-size: 20px;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .card p {
    color: #666;
    font-size: 14px;
    line-height: 1.6;
  }
  .arrow {
    color: var(--teal);
    font-size: 20px;
    margin-top: 12px;
  }

  /* === Recent === */
  .section-title {
    font-size: 16px;
    color: #444;
    margin-bottom: 16px;
    font-weight: 600;
  }
  .recent-list {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(34,92,92,0.04);
    border: 1px solid #e8eded;
  }
  .recent-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #f0f4f4;
  }
  .recent-item:last-child {
    border-bottom: none;
  }
  .recent-info b {
    font-size: 15px;
    color: #222;
  }
  .recent-meta {
    font-size: 13px;
    color: #888;
    margin-top: 3px;
  }
  .pages-tag {
    background: var(--teal-bg);
    color: var(--teal);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  /* === Modal === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal {
    background: white;
    border-radius: 16px;
    width: 95%;
    max-width: 1000px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 20px 28px;
    background: var(--teal);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 {
    font-size: 18px;
  }
  .close-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
  }
  .close-btn:hover {
    background: rgba(255,255,255,0.3);
  }
  .modal-body {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .modal-iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* === Setup notice === */
  .setup-notice {
    text-align: center;
    padding: 60px 40px;
    color: #555;
  }
  .setup-notice h3 {
    color: var(--teal);
    font-size: 22px;
    margin-bottom: 16px;
  }
  .setup-notice p {
    line-height: 1.8;
    margin-bottom: 12px;
    color: #666;
  }
  .setup-notice code {
    background: #fff5e6;
    padding: 4px 8px;
    border-radius: 4px;
    color: #cc6600;
    font-size: 13px;
  }
  .setup-notice .step {
    background: var(--teal-bg);
    border-left: 4px solid var(--teal);
    padding: 16px 20px;
    margin: 24px 0;
    text-align: left;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">강</div>
    <div class="logo-text">강안교육 · 교재 자동 편집</div>
  </div>
  <div class="user">
    <div class="user-avatar">김</div>
    <span>김지영</span>
  </div>
</header>

<main>
  <h1>안녕하세요, 김지영님 👋</h1>
  <p class="subtitle">오늘 만들 교재가 있나요?</p>

  <div class="card-grid">
    <div class="card highlight clickable" onclick="openEditor()">
      <span class="badge">▶ NEW</span>
      <h2>새 교재 만들기</h2>
      <p>강사 PDF 3개를 업로드해 단권 교재를 자동 생성합니다</p>
      <div class="arrow">→</div>
    </div>

    <div class="card">
      <span class="badge gray">관리</span>
      <h2>표지 / 강사 관리</h2>
      <p>표지 등록, 강사 정보</p>
    </div>
  </div>

  <h3 class="section-title">최근 작업</h3>
  <div class="recent-list">
    <div class="recent-item">
      <div class="recent-info">
        <b>수매깨 10주차 · 난이도 Q</b>
        <div class="recent-meta">자동 생성 · 110p</div>
      </div>
      <span class="pages-tag">발송완료</span>
    </div>
    <div class="recent-item">
      <div class="recent-info">
        <b>수매깨 7주차 · 난이도 Q</b>
        <div class="recent-meta">2025-04-26 · 김지영</div>
      </div>
      <span class="pages-tag">127p</span>
    </div>
    <div class="recent-item">
      <div class="recent-info">
        <b>수매깨 6주차 · 난이도 P</b>
        <div class="recent-meta">2025-04-19 · 김지영</div>
      </div>
      <span class="pages-tag">125p</span>
    </div>
  </div>
</main>

<!-- ==========================================
     교재 만들기 모달 (HF Spaces iframe 임베드)
     ============================================ -->
<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📚 교재 자동 편집기</h2>
      <button class="close-btn" onclick="closeEditor()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- 채워질 영역 -->
    </div>
  </div>
</div>

<script>
  // ==========================================
  // ★ 사용자 설정: 이 한 줄만 변경하세요 ★
  //
  // Hugging Face Spaces를 만든 후, 받은 URL을 아래에 붙여넣으세요.
  // 예: "https://huggingface.co/spaces/kimjy/kanganedu-textbook"
  // 또는 임베드 URL: "https://kimjy-kanganedu-textbook.hf.space"
  //
  // 아직 셋업 안 했으면 빈 문자열 ""로 두세요.
  // ==========================================
  const HF_SPACES_URL = "";

  function openEditor() {
    const modal = document.getElementById('editorModal');
    const body = document.getElementById('modalBody');

    if (HF_SPACES_URL && HF_SPACES_URL.length > 10) {
      // HF Spaces가 셋업되어 있으면 iframe으로 임베드
      body.innerHTML = `<iframe class="modal-iframe" src="${HF_SPACES_URL}" allow="fullscreen"></iframe>`;
    } else {
      // 아직 셋업 안 됨 - 안내문 표시
      body.innerHTML = `
        <div class="setup-notice">
          <h3>⚙️ 첫 셋업이 필요합니다</h3>
          <p>PDF 자동 처리 시스템을 1번만 셋업하면 영구 작동합니다.</p>

          <div class="step">
            <b>1단계.</b> <a href="https://huggingface.co/join" target="_blank">huggingface.co</a> 가입 (이메일만, 1분)
          </div>
          <div class="step">
            <b>2단계.</b> <a href="https://huggingface.co/new-space" target="_blank">new-space</a>에서 SDK = "Gradio" 선택 → Create
          </div>
          <div class="step">
            <b>3단계.</b> 생성된 Space의 Files 탭 → "+ Add file" → 받은 ZIP 파일 4개 업로드
          </div>
          <div class="step">
            <b>4단계.</b> URL 받음 (예: <code>https://[유저]-[이름].hf.space</code>)
          </div>
          <div class="step">
            <b>5단계.</b> 이 HTML 파일에서 <code>HF_SPACES_URL = "..."</code> 자리에 그 URL 붙여넣기
          </div>

          <p style="margin-top:24px;color:#999;font-size:13px;">
            막히면 클로드에게 화면 캡쳐 보내며 도움 요청하세요.
          </p>
        </div>
      `;
    }

    modal.classList.add('active');
  }

  function closeEditor() {
    document.getElementById('editorModal').classList.remove('active');
    document.getElementById('modalBody').innerHTML = '';
  }

  // ESC 키로 닫기
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeEditor();
  });
</script>

</body>
</html>
